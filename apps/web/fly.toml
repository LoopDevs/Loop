app = "loop-web"
primary_region = "iad"

[build]
  # A4-072: VITE_SENTRY_DSN / VITE_SENTRY_RELEASE / VITE_LOOP_ENV
  # must be supplied at BUILD time so the Vite-frozen
  # `import.meta.env.VITE_*` values exist in the production bundle.
  # Pass them in via Fly secrets at deploy time:
  #
  #   fly secrets set VITE_SENTRY_DSN=https://...@sentry.io/...
  #   fly secrets set VITE_SENTRY_RELEASE=$(git rev-parse HEAD)
  #   fly secrets set VITE_LOOP_ENV=production    # or staging
  #
  # The `[build.args]` block here pins compile-time defaults; Fly
  # overlays Fly secrets onto the build args automatically when
  # deploying via `flyctl deploy --build-arg`. Leaving any of the
  # Sentry args unset = Sentry stays off in the resulting bundle
  # (no init call), same behaviour as the pre-A4-072 baseline.
  [build.args]
    VITE_API_URL = "https://api.loopfinance.io"
    # Empty defaults so an operator who hasn't yet plumbed the
    # secret still gets a working bundle. Production deploys MUST
    # override via `--build-arg VITE_SENTRY_DSN=...` for Sentry to
    # initialise on the web side.
    VITE_SENTRY_DSN = ""
    VITE_SENTRY_RELEASE = ""
    VITE_LOOP_ENV = ""

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  # HTTP health probe — same pattern as apps/backend/fly.toml after
  # PR #120 + PR #121. Without this, Fly only knows the machine is up;
  # a crashed or hung `react-router-serve` that leaves the TCP listener
  # open would pass the default check while serving broken responses.
  # `/` is the cheapest route to probe: the home loader is
  # client-fetched-only (no SSR data fetch) so a hit just renders the
  # static shell. 15s interval matches backend.
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
