app = "loopfinance-api"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  GIFT_CARD_API_BASE_URL = "https://spend.ctx.com"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services.http_checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/health"
