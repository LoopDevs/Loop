app = "loopfinance-api"
primary_region = "iad"

[build]

# A2-407: run pending Drizzle migrations in a one-shot release
# machine BEFORE the new version takes traffic. A failing migration
# aborts the deploy — the old machines keep serving — instead of
# rolling out a new binary against a not-yet-migrated DB. The
# boot-time `runMigrations()` in `src/index.ts` is kept as a
# belt-and-braces safety net (drizzle's migrator is idempotent on an
# up-to-date DB, so the second call is a no-op).
[deploy]
  release_command = "node apps/backend/dist/migrate-cli.js"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  GIFT_CARD_API_BASE_URL = "https://spend.ctx.com"
  LOG_LEVEL = "info"
  # MNY-22: XLM min-price floor (major units per XLM). A price feed below
  # the floor is rejected as a glitched/near-zero read; unset = fail open.
  # Moderate level (~25-27% of a ~$0.11 XLM): rejects glitches + stale
  # feeds, only false-rejects on a >70% crash. USD anchor $0.03; GBP/EUR
  # set proportionally to their current XLM price.
  LOOP_XLM_MIN_PRICE_USD = "0.03"
  LOOP_XLM_MIN_PRICE_GBP = "0.024"
  LOOP_XLM_MIN_PRICE_EUR = "0.026"
  # Audit A-025: image-proxy SSRF allowlist is enforced in production.
  # `spend.ctx.com` hosts merchant card / logo URLs; the S3 bucket hosts
  # the raw image blobs CTX links from. Anything outside this list gets
  # 403'd by `validateImageUrl()` before any fetch.
  IMAGE_PROXY_ALLOWED_HOSTS = "spend.ctx.com,ctx-spend.s3.us-west-2.amazonaws.com"
  # Audit A-023 — Fly.io fronts each machine with its own edge proxy that
  # populates X-Forwarded-For. Turn trust on here so the rate limiter
  # keys on the actual client IP instead of the edge's single address.
  TRUST_PROXY = "true"
  # Tranche-1 mode (`docs/tranche-1-launch.md`): cashback delivered as
  # instant discount at order creation, no on-chain emission, no
  # withdrawal. Flipping to "false" later is the Tranche-2 cutover and
  # is a runtime-only change (web reads `/api/config` on each load).
  LOOP_PHASE_1_ONLY = "true"
  # Loop-native auth (ADR 013) — backend mints HS256 JWTs, generates
  # OTPs, sends email via Resend. Required for the Tranche-1
  # Loop-deposit-address payment flow (ADR 010 principal switch).
  LOOP_AUTH_NATIVE_ENABLED = "true"
  # Payment-watcher + procurement + payout workers. Boot-time fail-safe
  # in env.ts requires `LOOP_STELLAR_OPERATOR_SECRET` when set true.
  LOOP_WORKERS_ENABLED = "true"
  # Resend (https://resend.com) is the only supported provider when
  # `LOOP_AUTH_NATIVE_ENABLED=true` in production. The `console`
  # variant is dev-only; env.ts boot-rejects `console` in prod.
  EMAIL_PROVIDER = "resend"
  # `no-reply.loopfinance.io` is a Resend-verified subdomain, kept
  # separate from the apex `loopfinance.io` (Google Workspace mail)
  # so the two don't conflict at DKIM/SPF level.
  EMAIL_FROM_ADDRESS = "no-reply@no-reply.loopfinance.io"
  EMAIL_FROM_NAME = "Loop"
  # Recipients who hit "Reply" land at the operator inbox on the
  # apex domain (Google Workspace) rather than bouncing off the
  # no-reply sender.
  EMAIL_REPLY_TO_ADDRESS = "hello@loopfinance.io"
  # Sentry environment tag — paired with `VITE_LOOP_ENV` on the web
  # build so a staging deploy that runs `NODE_ENV=production` still
  # buckets Sentry events as `staging`.
  LOOP_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  # HTTP health check attached to the [http_service] block (modern Fly
  # syntax). Previously this was a top-level `[[services.http_checks]]`
  # block without a parent `[[services]]` — which `flyctl config
  # validate` reported as an orphaned `services` block and the scheduler
  # silently ignored. Effect: no HTTP health probes were running, so an
  # instance stuck at 500 would keep serving traffic until a deploy or
  # manual restart. Also see `scripts/lint-docs.sh` §8, which guards
  # against regression by running `flyctl config validate` on every
  # fly.toml on every push.
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
