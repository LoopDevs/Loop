app = "loopfinance-api"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  GIFT_CARD_API_BASE_URL = "https://spend.ctx.com"
  LOG_LEVEL = "info"
  # Audit A-025: image-proxy SSRF allowlist is enforced in production.
  # `spend.ctx.com` hosts merchant card / logo URLs; the S3 bucket hosts
  # the raw image blobs CTX links from. Anything outside this list gets
  # 403'd by `validateImageUrl()` before any fetch.
  IMAGE_PROXY_ALLOWED_HOSTS = "spend.ctx.com,ctx-spend.s3.us-west-2.amazonaws.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services.http_checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/health"
