version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      # Group minor/patch updates to reduce PR noise
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    # A2-106: the prior `reviewers: ['LoopDevs/engineering']` pointed
    # at a team that doesn't exist in the org (A2-103). Dependabot's
    # review-request API silently drops unknown teams, so the field
    # accomplished nothing except noise in the logs. Dropped entirely
    # — CODEOWNERS now handles reviewer assignment for the paths that
    # actually need human review (audit A2-104 closed by PR #823
    # covering admin/credits/stellar/migrations), and dependabot-
    # generated PRs land in the normal approval flow without a
    # phantom team ping.

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    labels:
      - 'ci'
    groups:
      # Collapse ALL action bumps into a single weekly PR (they were
      # opening one PR per action — labeler/cosign/codeql/checkout/flyctl
      # each separately — a needless slice of the PR pile). Majors ride
      # the same group; review the combined diff.
      github-actions:
        patterns:
          - '*'

  # Watch the backend + web Dockerfile base images (node:22-alpine, pinned by
  # digest). Without this the pinned SHA ages and the advisory trivy CVE scan
  # re-fails on every run once a new fixed Alpine CVE lands — the source of the
  # recurring CI-failure email noise. Dependabot now opens a bump PR when a
  # fresh digest is published, keeping the scan green without manual chasing.
  - package-ecosystem: 'docker'
    directories:
      - '/apps/backend'
      - '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
