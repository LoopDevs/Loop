name: E2E (real Tranche-1 purchase + wallet)

# Manually triggered only — this spends real XLM (or USDC) and creates
# a real order against the upstream CTX sandbox/production via the
# loop-native order surface (POST /api/orders/loop). Never run
# automatically. Default per run: ~$0.02 USD on Aerie + Stellar fees.
on:
  workflow_dispatch:
    inputs:
      amount_usd:
        description: 'Face-value amount (blank = 0.02 — default Aerie minimum)'
        required: false
        default: ''
      merchant_id:
        description: 'Override merchant id (blank = Aerie a8f90501-…)'
        required: false
        default: ''
      payment_method:
        description: 'Stellar asset to pay with'
        required: false
        type: choice
        default: 'xlm'
        options:
          - xlm
          - usdc
      currency:
        description: 'Order charge currency (must match merchant)'
        required: false
        type: choice
        default: 'USD'
        options:
          - USD
          - GBP
          - EUR

permissions:
  contents: read

concurrency:
  group: e2e-real
  cancel-in-progress: false

jobs:
  run:
    name: Tranche-1 loop-native purchase flow
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      # Backend's payment-watcher / procurement-worker / order ledger
      # all need a real postgres. Boot one in the runner.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: loop
          POSTGRES_PASSWORD: loop
          POSTGRES_DB: loop_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U loop -d loop_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: |
          # Match the hardened install posture used by the main CI
          # workflow: block arbitrary postinstall hooks, then
          # explicitly restore esbuild's platform binary selector so
          # tsx/vite-backed tooling still works on the runner.
          npm ci --ignore-scripts
          npm rebuild esbuild
      # Run a real backend in loop-native mode against real CTX. Logs
      # to a file so a later "Dump backend log" step can surface
      # upstream errors when the script hits a 502 UPSTREAM_ERROR.
      - name: Start backend (loop-native, real CTX)
        run: |
          mkdir -p "${{ runner.temp }}"
          nohup npm exec -w @loop/backend -- tsx src/index.ts \
            > "${{ runner.temp }}/backend.log" 2>&1 &
          echo $! > "${{ runner.temp }}/backend.pid"
        env:
          PORT: 8080
          NODE_ENV: test
          LOG_LEVEL: info
          GIFT_CARD_API_BASE_URL: https://spend.ctx.com
          INCLUDE_DISABLED_MERCHANTS: 'false'
          DATABASE_URL: 'postgres://loop:loop@127.0.0.1:5433/loop_test'
          # Tranche-1 backend env. Without these, POST /api/orders/loop
          # is gated off (loopOrdersEnabled=false in /api/config) and
          # the script's order-create call will 503/501.
          LOOP_AUTH_NATIVE_ENABLED: 'true'
          LOOP_WORKERS_ENABLED: 'true'
          LOOP_PHASE_1_ONLY: 'true'
          LOOP_JWT_SIGNING_KEY: ${{ secrets.LOOP_JWT_SIGNING_KEY }}
          LOOP_STELLAR_DEPOSIT_ADDRESS: ${{ secrets.LOOP_STELLAR_DEPOSIT_ADDRESS }}
          LOOP_STELLAR_OPERATOR_SECRET: ${{ secrets.LOOP_STELLAR_OPERATOR_SECRET }}
          LOOP_STELLAR_USDC_ISSUER: 'GA5ZSEJYB37JRC5AVCIA7VBRVRWWZBMXWXZAHYBRQHGSZHGCASCHV3VW'
          # Email OTP isn't exercised by this script (we refresh from a
          # cached refresh token), but env.ts validates EMAIL_PROVIDER
          # is set when LOOP_AUTH_NATIVE_ENABLED=true. Use a no-op
          # provider for tests; the script bypasses the email path.
          EMAIL_PROVIDER: 'console'
          EMAIL_FROM_ADDRESS: 'noreply@loopfinance.io'
          EMAIL_FROM_NAME: 'Loop'
      - name: Wait for backend
        run: npx wait-on http://localhost:8080/health --timeout 60000
      - name: Run real Tranche-1 purchase workflow
        run: node scripts/e2e-real.mjs
        env:
          BACKEND_URL: http://localhost:8080
          E2E_REFRESH_TOKEN: ${{ secrets.LOOP_E2E_REFRESH_TOKEN }}
          STELLAR_TEST_SECRET_KEY: ${{ secrets.STELLAR_TEST_SECRET_KEY }}
          E2E_AMOUNT_USD: ${{ inputs.amount_usd }}
          E2E_MERCHANT_ID: ${{ inputs.merchant_id }}
          LOOP_E2E_PAYMENT_METHOD: ${{ inputs.payment_method }}
          LOOP_E2E_CURRENCY: ${{ inputs.currency }}
          # Script writes the rotated refresh token here immediately
          # after the refresh call succeeds. The next step persists it
          # back to the repo secret regardless of whether the rest of
          # the flow passes — the old token is already dead.
          NEW_REFRESH_TOKEN_OUT: ${{ runner.temp }}/new-refresh-token.txt
      # Loop-native rotates refresh tokens on every call to /refresh-token,
      # so the secret MUST be updated after each run or the next workflow
      # run will 401 on the very first request. `if: always()` ensures we
      # persist the new token even if a later step (payment, poll, etc.)
      # fails.
      #
      # Requires a fine-grained PAT (`GH_SECRETS_PAT`) scoped to this repo
      # with "Secrets: Read and write" permission — the default GITHUB_TOKEN
      # has no way to write secrets.
      - name: Rotate LOOP_E2E_REFRESH_TOKEN secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_PAT }}
          TOKEN_FILE: ${{ runner.temp }}/new-refresh-token.txt
        run: |
          if [ ! -s "$TOKEN_FILE" ]; then
            echo "No rotated refresh token to persist — skipping."
            exit 0
          fi
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_SECRETS_PAT is not set — cannot rotate secret." \
              "The refresh token used by this run is now invalid."
            exit 1
          fi
          # Pipe the token via stdin so it's never visible in `ps` or
          # logs. gh CLI reads from stdin when --body-file is omitted.
          gh secret set LOOP_E2E_REFRESH_TOKEN \
            --repo "$GITHUB_REPOSITORY" \
            < "$TOKEN_FILE"
          rm -f "$TOKEN_FILE"
          echo "Rotated LOOP_E2E_REFRESH_TOKEN."
      - name: Dump backend log
        if: always()
        run: |
          if [ -f "${{ runner.temp }}/backend.log" ]; then
            echo "### Backend log (tail 200)"
            tail -n 200 "${{ runner.temp }}/backend.log"
          else
            echo "No backend log captured."
          fi
