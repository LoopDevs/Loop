name: E2E (real CTX + wallet)

# Manually triggered only — this spends real XLM and creates a real order
# against the upstream CTX sandbox/production. Never run automatically.
on:
  workflow_dispatch:
    inputs:
      amount_usd:
        description: 'USD amount to purchase (as a string)'
        required: false
        default: '5'
      merchant_id:
        description: 'Override merchant id (blank = first min-max in catalog)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: e2e-real
  cancel-in-progress: false

jobs:
  run:
    name: Full purchase flow
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      # The `dev` script uses `tsx watch --env-file=.env`, which would error in
      # CI since no `.env` exists. Run tsx directly against the source so only
      # the workflow `env:` block applies.
      - name: Start backend against real CTX
        run: npm exec -w @loop/backend -- tsx src/index.ts &
        env:
          PORT: 8080
          NODE_ENV: test
          LOG_LEVEL: info
          GIFT_CARD_API_BASE_URL: https://spend.ctx.com
          INCLUDE_DISABLED_MERCHANTS: 'false'
      - name: Wait for backend
        run: npx wait-on http://localhost:8080/health --timeout 60000
      - name: Run real purchase workflow
        run: node scripts/e2e-real.mjs
        env:
          BACKEND_URL: http://localhost:8080
          CTX_TEST_REFRESH_TOKEN: ${{ secrets.CTX_TEST_REFRESH_TOKEN }}
          STELLAR_TEST_SECRET_KEY: ${{ secrets.STELLAR_TEST_SECRET_KEY }}
          E2E_AMOUNT_USD: ${{ inputs.amount_usd }}
          E2E_MERCHANT_ID: ${{ inputs.merchant_id }}
          # Script writes the rotated refresh token here immediately after
          # the refresh call succeeds. The next step persists it back to
          # the repo secret regardless of whether the rest of the flow
          # passes — the old token is already dead.
          NEW_REFRESH_TOKEN_OUT: ${{ runner.temp }}/new-refresh-token.txt
      # CTX rotates refresh tokens on every call to /refresh-token, so the
      # secret MUST be updated after each run or the next workflow run will
      # 401 on the very first request. `if: always()` ensures we persist
      # the new token even if a later step (payment, poll, etc.) fails.
      #
      # Requires a fine-grained PAT (`GH_SECRETS_PAT`) scoped to this repo
      # with "Secrets: Read and write" permission — the default GITHUB_TOKEN
      # has no way to write secrets.
      - name: Rotate CTX_TEST_REFRESH_TOKEN secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_PAT }}
          TOKEN_FILE: ${{ runner.temp }}/new-refresh-token.txt
        run: |
          if [ ! -s "$TOKEN_FILE" ]; then
            echo "No rotated refresh token to persist — skipping."
            exit 0
          fi
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_SECRETS_PAT is not set — cannot rotate secret." \
              "The refresh token used by this run is now invalid."
            exit 1
          fi
          # --body-file avoids ever echoing the secret into the shell;
          # GitHub's log-masking kicks in on the next line onward once the
          # secret value is registered.
          gh secret set CTX_TEST_REFRESH_TOKEN \
            --body-file "$TOKEN_FILE" \
            --repo "$GITHUB_REPOSITORY"
          rm -f "$TOKEN_FILE"
          echo "Rotated CTX_TEST_REFRESH_TOKEN."
