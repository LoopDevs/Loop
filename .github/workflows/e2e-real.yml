name: E2E (real CTX + wallet)

# Manually triggered only — this spends real XLM and creates a real order
# against the upstream CTX sandbox/production. Never run automatically.
on:
  workflow_dispatch:
    inputs:
      amount_usd:
        description: 'USD amount to purchase (blank = use merchant min — cheapest card)'
        required: false
        default: ''
      merchant_id:
        description: 'Override merchant id (blank = first min-max in catalog)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: e2e-real
  cancel-in-progress: false

jobs:
  run:
    name: Full purchase flow
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: |
          # Match the hardened install posture used by the main CI
          # workflow: block arbitrary postinstall hooks, then
          # explicitly restore esbuild's platform binary selector so
          # tsx/vite-backed tooling still works on the runner.
          npm ci --ignore-scripts
          npm rebuild esbuild
      # The `dev` script uses `tsx watch --env-file=.env`, which would error in
      # CI since no `.env` exists. Run tsx directly against the source so only
      # the workflow `env:` block applies. Redirect stdout+stderr to a file so
      # a later "Dump backend log" step can surface upstream errors — backend
      # logs are the only place we see the CTX status/body when the script
      # hits a 502 UPSTREAM_ERROR.
      - name: Start backend against real CTX
        run: |
          mkdir -p "${{ runner.temp }}"
          nohup npm exec -w @loop/backend -- tsx src/index.ts \
            > "${{ runner.temp }}/backend.log" 2>&1 &
          echo $! > "${{ runner.temp }}/backend.pid"
        env:
          PORT: 8080
          NODE_ENV: test
          LOG_LEVEL: info
          GIFT_CARD_API_BASE_URL: https://spend.ctx.com
          INCLUDE_DISABLED_MERCHANTS: 'false'
          # A4-118: env.ts requires DATABASE_URL even when
          # NODE_ENV=test, and `index.ts` skips migrations under
          # test but still imports the validated env. Without a
          # placeholder here the backend boot fails before /health
          # is reachable. The script under `scripts/e2e-real.mjs`
          # only exercises the CTX-proxy purchase flow (no DB-backed
          # endpoints), so an unreachable placeholder is fine —
          # matches the PR-time `test-e2e` job which does the same.
          DATABASE_URL: 'postgresql://placeholder:placeholder@127.0.0.1:5433/placeholder'
      - name: Wait for backend
        run: npx wait-on http://localhost:8080/health --timeout 60000
      - name: Run real purchase workflow
        run: node scripts/e2e-real.mjs
        env:
          BACKEND_URL: http://localhost:8080
          CTX_TEST_REFRESH_TOKEN: ${{ secrets.CTX_TEST_REFRESH_TOKEN }}
          STELLAR_TEST_SECRET_KEY: ${{ secrets.STELLAR_TEST_SECRET_KEY }}
          E2E_AMOUNT_USD: ${{ inputs.amount_usd }}
          E2E_MERCHANT_ID: ${{ inputs.merchant_id }}
          # Script writes the rotated refresh token here immediately after
          # the refresh call succeeds. The next step persists it back to
          # the repo secret regardless of whether the rest of the flow
          # passes — the old token is already dead.
          NEW_REFRESH_TOKEN_OUT: ${{ runner.temp }}/new-refresh-token.txt
      # CTX rotates refresh tokens on every call to /refresh-token, so the
      # secret MUST be updated after each run or the next workflow run will
      # 401 on the very first request. `if: always()` ensures we persist
      # the new token even if a later step (payment, poll, etc.) fails.
      #
      # Requires a fine-grained PAT (`GH_SECRETS_PAT`) scoped to this repo
      # with "Secrets: Read and write" permission — the default GITHUB_TOKEN
      # has no way to write secrets.
      - name: Rotate CTX_TEST_REFRESH_TOKEN secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_PAT }}
          TOKEN_FILE: ${{ runner.temp }}/new-refresh-token.txt
        run: |
          if [ ! -s "$TOKEN_FILE" ]; then
            echo "No rotated refresh token to persist — skipping."
            exit 0
          fi
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_SECRETS_PAT is not set — cannot rotate secret." \
              "The refresh token used by this run is now invalid."
            exit 1
          fi
          # Pipe the token via stdin so it's never visible in `ps` or logs.
          # The runner's gh CLI doesn't support --body-file; stdin is the
          # documented alternative ("reads from standard input if not
          # specified").
          gh secret set CTX_TEST_REFRESH_TOKEN \
            --repo "$GITHUB_REPOSITORY" \
            < "$TOKEN_FILE"
          rm -f "$TOKEN_FILE"
          echo "Rotated CTX_TEST_REFRESH_TOKEN."
      - name: Dump backend log
        if: always()
        run: |
          if [ -f "${{ runner.temp }}/backend.log" ]; then
            echo "### Backend log (tail 200)"
            tail -n 200 "${{ runner.temp }}/backend.log"
          else
            echo "No backend log captured."
          fi
