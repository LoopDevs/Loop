name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Review PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" || echo "")
          if [ -z "$DIFF" ]; then
            echo "No diff found, skipping review"
            exit 0
          fi

          PROMPT=$(cat <<'PROMPT_END'
          You are reviewing a PR for the Loop gift card app.
          Rules to check:
          - No hardcoded secrets or tokens
          - No direct Capacitor imports outside app/native/
          - No server-side data fetching in loaders
          - No any types except proto bridge
          - All upstream responses must be Zod-validated
          - Docs must be updated when code changes
          - Tests must be added for new logic
          - No console.log in source
          Review the diff. Report: CRITICAL (rule violations), HIGH (bugs), MEDIUM (suggestions), CHECK (docs needed). Be concise. If everything looks good, say so.
          PROMPT_END
          )

          REVIEW=$(echo "$DIFF" | claude -p --print "$PROMPT" 2>/dev/null || echo "")

          if [ -n "$REVIEW" ]; then
            gh pr comment "$PR_NUMBER" --body "## Claude Code Review

          $REVIEW" || true
          fi
