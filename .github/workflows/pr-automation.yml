name: PR Automation

on:
  pull_request:
    types: [opened, synchronize, labeled]

# A2-116: deny-by-default at the workflow level so an added job
# without explicit `permissions:` can't inherit write access to
# anything. Each job below opts into the narrow set it needs.
permissions: {}

jobs:
  label:
    name: Auto-label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'

  size-check:
    name: PR size check
    # Skip on `labeled` — adding/removing labels doesn't change diff size, so
    # re-running would just waste CI minutes (or re-post the warning if the
    # dedup below ever regressed).
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check PR size
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Get additions/deletions from the event payload (no API call needed)
          ADDITIONS=${{ github.event.pull_request.additions || 0 }}
          DELETIONS=${{ github.event.pull_request.deletions || 0 }}
          TOTAL=$((ADDITIONS + DELETIONS))

          echo "PR size: +$ADDITIONS -$DELETIONS ($TOTAL lines changed)"

          if [ "$TOTAL" -le 500 ]; then
            exit 0
          fi

          # standards.md §"PR size" describes a single "large PR" flag per PR —
          # without dedup, every `synchronize` push to an already-large PR
          # would post another identical comment.
          EXISTING=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json comments \
            --jq '[.comments[] | select(.body | startswith("⚠️ **Large PR**"))] | length')

          if [ "$EXISTING" != "0" ]; then
            echo "Large-PR comment already posted — skipping."
            exit 0
          fi

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "⚠️ **Large PR** — $TOTAL lines changed (+$ADDITIONS/-$DELETIONS). Consider splitting into smaller PRs for easier review." || true
