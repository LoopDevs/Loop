name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint, format & docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run lint:docs

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage --workspaces --if-present
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            apps/backend/coverage/
            apps/web/coverage/
          retention-days: 7
          if-no-files-found: ignore

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high

  build:
    name: Build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build backend
        run: npm run build -w @loop/backend
      - name: Build web (SSR)
        run: npm run build -w @loop/web
        env:
          VITE_API_URL: https://api.loopfinance.io
      - name: Build web (mobile static export)
        run: npm run build:mobile -w @loop/web
        env:
          VITE_API_URL: https://api.loopfinance.io
      - name: Report bundle size
        run: |
          echo "## Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          SSR_SIZE=$(du -sh apps/web/build/client/ | cut -f1)
          echo "| Web (SSR client) | $SSR_SIZE |" >> $GITHUB_STEP_SUMMARY
          for f in apps/web/build/client/assets/*.js; do
            SIZE=$(du -sh "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [typecheck, lint, test-unit, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build backend
        run: npm run build -w @loop/backend
      - name: Build web for e2e
        run: npm run build -w @loop/web
        env:
          VITE_API_URL: http://localhost:8080
      - name: Start backend
        run: npm run start -w @loop/backend &
        env:
          PORT: 8080
          NODE_ENV: test
          GIFT_CARD_API_BASE_URL: https://spend.ctx.com
          INCLUDE_DISABLED_MERCHANTS: 'true'
      - name: Wait for backend
        run: npx wait-on http://localhost:8080/health --timeout 30000
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  notify:
    name: Discord notification
    runs-on: ubuntu-latest
    if: always()
    needs: [typecheck, lint, test-unit, audit, build]
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEPLOYMENTS }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            STATUS="❌ FAILED"
            COLOR=15158332
          else
            STATUS="✅ PASSED"
            COLOR=3066993
          fi

          # Sanitize commit message for JSON (escape quotes, remove newlines)
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/"/\\"/g' | sed "s/'/\\'/g" | tr -d '`')

          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"$STATUS — CI Pipeline\",
              \"description\": \"**Commit:** ${SAFE_MSG}\n**Branch:** ${{ github.ref_name }}\n**Author:** ${{ github.actor }}\",
              \"color\": $COLOR,
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$DISCORD_WEBHOOK" || true
