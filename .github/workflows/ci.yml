name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint, format & docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run lint:docs

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage --workspaces --if-present
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            apps/backend/coverage/
            apps/web/coverage/
          retention-days: 7
          if-no-files-found: ignore

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high

  build:
    name: Build verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build backend
        run: npm run build -w @loop/backend
      - name: Build web (SSR)
        run: npm run build -w @loop/web
        env:
          VITE_API_URL: https://api.loopfinance.io
      - name: Build web (mobile static export)
        run: npm run build:mobile -w @loop/web
        env:
          VITE_API_URL: https://api.loopfinance.io
      - name: Report bundle size
        run: |
          echo "## Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          SSR_SIZE=$(du -sh apps/web/build/client/ | cut -f1)
          echo "| Web (SSR client) | $SSR_SIZE |" >> $GITHUB_STEP_SUMMARY
          for f in apps/web/build/client/assets/*.js; do
            SIZE=$(du -sh "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    needs: [typecheck, lint, test-unit, build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build backend
        run: npm run build -w @loop/backend
      - name: Build web for e2e
        run: npm run build -w @loop/web
        env:
          VITE_API_URL: http://localhost:8080
      - name: Start backend
        run: npm run start -w @loop/backend &
        env:
          PORT: 8080
          NODE_ENV: test
          GIFT_CARD_API_BASE_URL: https://spend.ctx.com
          INCLUDE_DISABLED_MERCHANTS: 'true'
      - name: Wait for backend
        run: npx wait-on http://localhost:8080/health --timeout 30000
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  notify:
    name: Discord notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    # Include test-e2e so the Discord status matches the actual PR gate. Without
    # it, Discord reported PASSED whenever the fast jobs were green, even if
    # e2e had failed.
    needs: [typecheck, lint, test-unit, audit, build, test-e2e]
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEPLOYMENTS }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          FAILED: ${{ contains(needs.*.result, 'failure') }}
        run: |
          set -euo pipefail
          if [ "$FAILED" = "true" ]; then
            STATUS="❌ FAILED"
            COLOR=15158332
          else
            STATUS="✅ PASSED"
            COLOR=3066993
          fi

          # Take the first line of the commit message; everything else (quotes,
          # backslashes, newlines) is handled by jq's JSON encoder. The previous
          # sed-based sanitizer could leave a literal backslash in the body,
          # which made the JSON malformed and a careful commit message could
          # inject extra JSON fields.
          FIRST_LINE=$(printf '%s' "${COMMIT_MSG:-}" | head -n1)
          DESCRIPTION=$(printf '**Commit:** %s\n**Branch:** %s\n**Author:** %s' \
            "$FIRST_LINE" "$BRANCH" "$ACTOR")
          URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          PAYLOAD=$(jq -cn \
            --arg title "$STATUS — CI Pipeline" \
            --arg desc  "$DESCRIPTION" \
            --argjson color $COLOR \
            --arg url   "$URL" \
            --arg ts    "$TIMESTAMP" \
            '{embeds:[{title:$title,description:$desc,color:$color,url:$url,timestamp:$ts}]}')

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK" || true
